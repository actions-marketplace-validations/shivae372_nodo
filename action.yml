name: 'Nodo code map'
description: 'Map the codebase and comment a blast-radius + issues summary on the PR. Zero-dependency (pure Python standard library).'
branding:
  icon: 'git-branch'
  color: 'purple'
inputs:
  path:
    description: 'Project root to scan'
    default: '.'
  comment:
    description: 'Post/update a PR comment with the summary (true/false)'
    default: 'true'
  args:
    description: "Extra args passed to nodo (e.g. '--no-ast' for the fast regex pass)"
    default: '--no-ast'
runs:
  using: composite
  steps:
    - name: Run nodo
      shell: bash
      run: python "${{ github.action_path }}/nodo.py" "${{ inputs.path }}" ${{ inputs.args }}
    - name: Comment summary on the PR
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        NODO_PATH: ${{ inputs.path }}
      with:
        script: |
          const fs = require('fs'), path = require('path');
          const file = path.join(process.env.NODO_PATH || '.', '.nodo', 'nodo-context.json');
          let ctx;
          try { ctx = JSON.parse(fs.readFileSync(file, 'utf8')); }
          catch (e) { core.warning('nodo: no nodo-context.json (' + e.message + ')'); return; }
          const iss = ctx.issues || [];
          const sev = s => iss.filter(i => i.severity === s).length;
          const codeFiles = (ctx.files || []).filter(f => (f.kind || 'code') === 'code').length;
          const deps = (ctx.edges || []).filter(e => (e.kind || 'import') === 'import').length;
          const hubs = (ctx.hubs || []).slice(0, 5)
            .map(h => '`' + h.file + '` (' + h.edges + ')').join(', ');
          const top = iss.slice(0, 10).map(i =>
            '- `' + (i.confidence || '?') + '/' + i.severity + '` **' + i.type + '** — `' +
            (i.file || '') + '`' + (i.line ? ':' + i.line : '')).join('\n');
          const marker = '<!-- nodo-map -->';
          const body = marker + '\n## 🗺️ nodo code map\n\n' +
            '**' + codeFiles + '** files · **' + deps + '** dependencies · issues: **' +
            sev('error') + '** error / **' + sev('warn') + '** warn / **' + sev('info') + '** info\n\n' +
            (hubs ? '**Load-bearing files:** ' + hubs + '\n\n' : '') +
            (top ? '<details><summary>Top findings</summary>\n\n' + top + '\n</details>\n'
                 : '_No issues found._\n') +
            '\n<sub>Generated by [nodo](https://github.com/shivae372/nodo) — deterministic, zero-dependency.</sub>';
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
